<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ferry</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <section class="top-slab">
        <div class="brand-row">
          <div class="brand-lockup">
            <div class="logo-after"><img src="./icons/extentionIcon.png" alt="icon not available"></div>
            <div class="brand-copy">
              <h1 class="name-after">Ferry</h1>
            </div>
          </div>
          <div class="brand-actions">
            <div class="status-after" id="status-pill-container">
              <div class="pill" id="status-pill">
                <div id="status-dot" class="pill-dot"></div>
                <span id="status-pill-text">Checking</span>
              </div>
            </div>
            <button id="open-settings" class="icon-btn" type="button" title="Open settings" aria-label="Open settings" style="display: none;">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="header-settings-icon"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <section class="signal-row" aria-label="Live signals">
          <div class="pill pill-live" id="summary-active-pill" data-signal="active">
            <div class="pill-dot"></div>
            <span>Live · <span id="summary-active">0</span></span>
          </div>
          <div class="pill pill-error" id="summary-error-pill" data-signal="attention">
            <div class="pill-dot"></div>
            <span>Error · <span id="summary-error">0</span></span>
          </div>
          <div class="pill pill-done" id="summary-done-pill" data-signal="done">
            <div class="pill-dot"></div>
            <span>Done · <span id="summary-done">0</span></span>
          </div>
        </section>

        <div id="offline-banner" class="offline-banner" hidden>
          <div class="offline-banner-content">
            <span>Ferry desktop app not running</span>
            <div id="launch-app" class="launch-link">Open Ferry</div>
          </div>
        </div>
      </section>

      <section class="activity">
        <div class="activity-header">
          <div>
            <div class="activity-title">Recent transfers</div>
          </div>
          <div class="activity-actions">
            <button id="clear-activity" class="icon-btn" type="button" aria-label="Clear activity" title="Clear activity">
              <svg viewBox="0 0 20 20" aria-hidden="true">
                <path fill="currentColor" d="M7.25 3.75a.75.75 0 0 0-.75.75v.75H4.25a.75.75 0 0 0 0 1.5h.46l.58 8.06a2 2 0 0 0 2 1.86h5.42a2 2 0 0 0 2-1.86l.58-8.06h.46a.75.75 0 0 0 0-1.5H13.5V4.5a.75.75 0 0 0-.75-.75h-5.5Zm.75 1.5H12V5.25H8Zm-.74 2.5l.54 7.54a.5.5 0 0 0 .5.46h3.4a.5.5 0 0 0 .5-.46l.54-7.54H7.26Z" />
              </svg>
            </button>
          </div>
        </div>

        <div id="job-list" class="job-list">
          <div class="empty-state">
            <div class="empty-state-title">No recent activity</div>
            <div class="empty-state-copy">Start a transfer and Ferry will keep the deck in sync.</div>
          </div>
        </div>
      </section>
    </main>

    <script src="popup.js" type="module"></script>
  </body>
</html>
