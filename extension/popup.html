            </button>
            <div class="status-pill" id="status-pill" title="Checking desktop app…">
              <div id="status-dot" class="status-dot"></div>
              <span id="status-pill-text">Checking</span>
            </div>
          </div>
        </div>

        <section class="signal-row" aria-label="Live signals">
          <button class="signal-card" data-signal="active" type="button">
            <span class="signal-icon signal-icon-live" aria-hidden="true"></span>
            <span class="signal-label">Live</span>
            <span id="summary-active" class="signal-value">0</span>
          </button>
          <button class="signal-card" data-signal="attention" type="button">
            <span class="signal-icon signal-icon-attention" aria-hidden="true"></span>
            <span class="signal-label">Error</span>
            <span id="summary-error" class="signal-value">0</span>
          </button>
          <button class="signal-card" data-signal="done" type="button">
            <span class="signal-icon signal-icon-done" aria-hidden="true"></span>
            <span class="signal-label">Done</span>
            <span id="summary-done" class="signal-value">0</span>
          </button>
        </section>
      </section>

      <section class="activity">
        <div class="activity-header">
          <div>
            <div class="activity-title">Recent transfers</div>
          </div>
          <div class="activity-actions">
            <button id="clear-activity" class="icon-btn" type="button" aria-label="Clear activity" title="Clear activity">
              <svg viewBox="0 0 20 20" aria-hidden="true">
                <path fill="currentColor" d="M7.25 3.75a.75.75 0 0 0-.75.75v.75H4.25a.75.75 0 0 0 0 1.5h.46l.58 8.06a2 2 0 0 0 2 1.86h5.42a2 2 0 0 0 2-1.86l.58-8.06h.46a.75.75 0 0 0 0-1.5H13.5V4.5a.75.75 0 0 0-.75-.75h-5.5Zm.75 1.5H12V5.25H8Zm-.74 2.5l.54 7.54a.5.5 0 0 0 .5.46h3.4a.5.5 0 0 0 .5-.46l.54-7.54H7.26Z" />
              </svg>
            </button>
          </div>
        </div>

        <div id="job-list" class="job-list">
          <div class="empty-state">
            <div class="empty-state-mark" aria-hidden="true">
              <img src="icons/icon48.png" alt="" class="empty-state-image" />
            </div>
            <div class="empty-state-title">No recent activity</div>
            <div class="empty-state-copy">Start a transfer and Ferry will keep the deck in sync.</div>
          </div>
        </div>
      </section>
    </main>

    <script src="popup.js" type="module"></script>
  </body>
</html>
