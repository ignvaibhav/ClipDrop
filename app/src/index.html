<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClipDrop Desktop</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "IBM Plex Sans", "Segoe UI", system-ui, sans-serif;
        background: #0e0e10;
        color: #ffffff;
      }
      .card {
        border: 1px solid #2f2f33;
        border-radius: 14px;
        padding: 24px;
        max-width: 480px;
        text-align: center;
      }
      .logo {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.01em;
        margin-bottom: 8px;
      }
      .subtitle {
        color: #b5b5b5;
        font-size: 13px;
        margin: 0 0 16px;
      }
      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        border-top: 1px solid #1f1f23;
        font-size: 13px;
      }
      .info-label {
        color: #888;
      }
      .info-value {
        font-family: "SF Mono", "Fira Code", monospace;
        color: #d0d0d0;
      }
      .status-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
      }
      .status-dot.online {
        background: #4ade80;
      }
      .status-dot.offline {
        background: #f87171;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">ClipDrop</div>
      <p class="subtitle">Desktop companion running in tray mode</p>

      <div class="info-row">
        <span class="info-label">Local API</span>
        <span class="info-value">127.0.0.1:49152</span>
      </div>
      <div class="info-row">
        <span class="info-label">Version</span>
        <span id="version" class="info-value">0.1.0</span>
      </div>
      <div class="info-row">
        <span class="info-label">Status</span>
        <span id="api-status" class="info-value">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Checking…</span>
        </span>
      </div>
    </div>

    <script>
      async function checkApiStatus() {
        const dot = document.getElementById("status-dot");
        const text = document.getElementById("status-text");
        const versionEl = document.getElementById("version");
        try {
          const res = await fetch("http://127.0.0.1:49152/health");
          if (res.ok) {
            const data = await res.json();
            dot.className = "status-dot online";
            text.textContent = "Online";
            if (data.version) versionEl.textContent = data.version;
          } else {
            dot.className = "status-dot offline";
            text.textContent = "Error";
          }
        } catch {
          dot.className = "status-dot offline";
          text.textContent = "Offline";
        }
      }

      checkApiStatus();
      setInterval(checkApiStatus, 10000);
    </script>
  </body>
</html>
