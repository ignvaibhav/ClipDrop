name: macos-desktop

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            app/src-tauri -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2'

      - name: Build Island macOS app bundle
        working-directory: app/src-tauri
        run: cargo tauri build --bundles app

      - name: Ad-hoc sign macOS app bundle
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH="$(find app/src-tauri/target/release/bundle -type d -name 'Island.app' | head -n 1)"
          if [[ -z "${APP_PATH}" ]]; then
            echo "Island.app not found" >&2
            exit 1
          fi

          # Seal the full bundle before packaging so Gatekeeper sees a consistent app bundle.
          codesign --force --deep --sign - "${APP_PATH}"
          codesign --verify --deep --strict --verbose=4 "${APP_PATH}"

      - name: Package macOS app bundle
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH="$(find app/src-tauri/target/release/bundle -type d -name 'Island.app' | head -n 1)"
          if [[ -z "${APP_PATH}" ]]; then
            echo "Island.app not found" >&2
            exit 1
          fi

          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "dist/Island-macOS-app.zip"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: island-macos-bundles
          path: |
            dist/Island-macOS-app.zip
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Island-macOS-app.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
