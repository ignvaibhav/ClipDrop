name: desktop-release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: macos
            label: macOS
            runner: macos-latest
            bundle_args: app
            artifact_name: island-macos-bundles
          - key: windows
            label: Windows
            runner: windows-latest
            bundle_args: nsis
            artifact_name: island-windows-bundles
          - key: linux
            label: Linux
            runner: ubuntu-22.04
            bundle_args: deb,appimage
            artifact_name: island-linux-bundles

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            app/src-tauri -> target

      - name: Install Linux packaging dependencies
        if: matrix.key == 'linux'
        run: |
          set -euo pipefail
          WEBKIT_PKG="libwebkit2gtk-4.1-dev"
          if ! apt-cache show "${WEBKIT_PKG}" >/dev/null 2>&1; then
            WEBKIT_PKG="libwebkit2gtk-4.0-dev"
          fi
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            pkg-config \
            zip \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            ffmpeg \
            libssl-dev \
            "${WEBKIT_PKG}"

      - name: Install Windows packaging dependencies
        if: matrix.key == 'windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          choco install ffmpeg -y --no-progress

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2'

      - name: Verify bundled macOS sidecars
        if: matrix.key == 'macos'
        shell: bash
        run: |
          set -euo pipefail

          for binary in yt-dlp-mac ffmpeg-mac ffprobe-mac; do
            path="app/src-tauri/resources/${binary}"
            if [[ ! -s "${path}" ]]; then
              echo "Missing required macOS sidecar: ${path}" >&2
              exit 1
            fi
          done

      - name: Hydrate Linux sidecars
        if: matrix.key == 'linux'
        run: ./scripts/hydrate-sidecars-linux.sh

      - name: Hydrate Windows sidecars
        if: matrix.key == 'windows'
        shell: pwsh
        run: ./scripts/hydrate-sidecars-windows.ps1

      - name: Build desktop bundle
        working-directory: app/src-tauri
        run: cargo tauri build --bundles ${{ matrix.bundle_args }}

      - name: Package macOS app bundle
        if: matrix.key == 'macos'
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH="$(find app/src-tauri/target/release/bundle -type d -name 'Island.app' | head -n 1)"
          if [[ -z "${APP_PATH}" ]]; then
            echo "Island.app not found" >&2
            exit 1
          fi

          codesign --force --deep --sign - "${APP_PATH}"
          codesign --verify --deep --strict --verbose=4 "${APP_PATH}"

          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "dist/Island-macOS-app.zip"

      - name: Package Windows installer
        if: matrix.key == 'windows'
        shell: pwsh
        run: |
          $setup = Get-ChildItem "app/src-tauri/target/release/bundle/nsis" -Filter "*setup.exe" -Recurse |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $setup) {
            throw "Windows setup executable not found"
          }

          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          Copy-Item $setup.FullName "dist/Island-windows-setup.exe" -Force

      - name: Package Linux bundles
        if: matrix.key == 'linux'
        shell: bash
        run: |
          set -euo pipefail

          APPIMAGE_PATH="$(find app/src-tauri/target/release/bundle -type f -name '*.AppImage' | head -n 1)"
          DEB_PATH="$(find app/src-tauri/target/release/bundle -type f -name '*.deb' | head -n 1)"

          if [[ -z "${APPIMAGE_PATH}" || -z "${DEB_PATH}" ]]; then
            echo "Expected Linux AppImage and .deb artifacts were not found" >&2
            exit 1
          fi

          mkdir -p dist
          cp "${APPIMAGE_PATH}" "dist/Island-linux.AppImage"
          cp "${DEB_PATH}" "dist/Island-linux.deb"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
